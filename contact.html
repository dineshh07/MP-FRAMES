<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MP Frames - Contact</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    margin:0;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

nav a:hover{
    color:gold;
}

.container{
    max-width:1100px;
    margin:40px auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.contact-info,
.contact-form{

    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.contact-info h2,
.contact-form h2{

    margin-top:0;

}

.contact-info p{

    margin:20px 0;
    font-size:17px;

}

.contact-info i{

    color:#25D366;
    margin-right:10px;

}

.contact-form input,
.contact-form textarea{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    box-sizing:border-box;

}

.contact-form textarea{

    height:120px;
    resize:none;

}

.contact-form button{

    width:100%;
    padding:15px;
    background:#111;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:18px;

}

.contact-form button:hover{

    background:gold;
    color:black;

}

.whatsapp{

    display:inline-block;
    margin-top:20px;
    background:#25D366;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:6px;

}

.whatsapp:hover{

    background:#1ebc57;

}

footer{

    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;

}

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h2>MP Frames</h2>

<nav>

<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
</a>

</nav>

</header>

<div class="container">

<div class="contact-info">

<h2>Contact Us</h2>

<p>
<i class="fa-solid fa-location-dot"></i>
Chennai, Tamil Nadu, India
</p>

<p>
<i class="fa-solid fa-phone"></i>
+91 6382667556
</p>

<p>
<i class="fa-solid fa-envelope"></i>
mpframes@gmail.com
</p>

<p>
<i class="fa-solid fa-clock"></i>
Mon - Sat : 9:00 AM - 8:00 PM
</p>

<a class="whatsapp"
href="https://wa.me/916382667556"
target="_blank">

<i class="fa-brands fa-whatsapp"></i>

Chat on WhatsApp

</a>

</div>

<div class="contact-form">

<h2>Send Message</h2>

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="email"
id="email"
placeholder="Your Email">

<textarea
id="message"
placeholder="Your Message"></textarea>

<button onclick="sendMessage()">

Send Message

</button>

</div>

</div>

<footer>

<p>© 2026 MP Frames. All Rights Reserved.</p>

</footer>

<script>

function sendMessage(){

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

const message =
document.getElementById("message").value.trim();

if(name=="" || email=="" || message==""){

alert("Please fill all fields");

return;

}

const text =
`Hello MP Frames!

Name: ${name}

Email: ${email}

Message:
${message}`;

window.open(
"https://wa.me/916382667556?text="+
encodeURIComponent(text),
"_blank"
);

}

</script>

</body>
</html>
