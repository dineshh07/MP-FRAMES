<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Frames - Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#111;
    color:#fff;
    padding:15px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.form-box{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

input,
select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:gold;
    color:#000;
}

#product-list{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
    text-align:center;
}

.card img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}
</style>

</head>
<body>

<header>
    <h1>MP Frames Admin Panel</h1>

    <button onclick="logout()">
        Logout
    </button>
</header>

<div class="container">

<div class="form-box">

<h2>Add New Product</h2>

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Product Price">

<input
type="file"
id="imagefile"
accept="image/*">

<select id="category">
    <option value="">Select Category</option>
    <option value="Wooden">Wooden Frame</option>
    <option value="Photo">Photo Frame</option>
    <option value="Collage">Collage Frame</option>
    <option value="Gift">Gift Frame</option>
    <option value="Wall">Wall Frame</option>
</select>

<button onclick="addProduct()">
Add Product
</button>

</div>

<h2 style="margin-top:40px;">All Products</h2>

<div id="product-list"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
