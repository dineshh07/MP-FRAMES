<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Premium Photo Frames - MP Frames">

<title>MP Frames - Products</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

header a:hover{
    color:gold;
}

.logo h2{
    margin:0;
}

#products{
    padding:40px;
}

#products h2{
    text-align:center;
}

.search-box{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
    margin:30px 0;
}

.search-box input{

    width:300px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;

}

.search-box select{

    padding:12px;
    border-radius:8px;
    font-size:16px;

}

.product-container{

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;

}

.product{

    background:white;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    transition:.3s;

}

.product:hover{

transform:translateY(-5px);

}

.product img{

width:100%;

height:250px;

object-fit:cover;

}

.product-content{

padding:15px;

text-align:center;

}

.product h3{

margin:10px 0;

}

.product p{

margin:5px 0;

}

.price{

font-size:22px;

font-weight:bold;

color:#e91e63;

}

button{

padding:10px 18px;

margin:5px;

border:none;

border-radius:6px;

cursor:pointer;

}

.view{

background:#2196F3;

color:white;

}

.cart{

background:#111;

color:white;

}

button:hover{

opacity:.9;

}

footer{

background:#111;

color:white;

text-align:center;

padding:20px;

margin-top:40px;

}

</style>

</head>

<body>

<header>

<div class="logo">

<h2>MP Frames</h2>

</div>

<nav>

<a href="index.html">Home</a>

<a href="products.html">Products</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

<a href="cart.html">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">0</span>

</a>

</nav>

</header>

<section id="products">

<h2>Our Photo Frames</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Products...">

<select id="filter">

<option value="All">All Categories</option>

<option value="Wooden">Wooden</option>

<option value="Photo">Photo</option>

<option value="Collage">Collage</option>

<option value="Gift">Gift</option>

<option value="Wall">Wall</option>

</select>

</div>

<div
class="product-container"
id="product-container">

</div>

</section>

<footer>

<p>© 2026 MP Frames. All Rights Reserved.</p>

</footer>

<script type="module" src="products.js"></script>

</body>
</html>
